name: CI/CD - Build, Push, and Update Helm

on:
  push:
    branches: 
      - main
      - feature/login-system
      - feature/helm-migration
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-project1:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-project1:v1.1

      - name: Update Helm Values
        run: |
          # Update to use version tag v1.1 (you can increment manually for releases)
          sed -i 's|tag:.*|tag: v1.1|' charts/project1/values.yaml

      - name: Commit and Push Helm Change
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add charts/project1/values.yaml
          
          # This ensures it pushes back to whichever branch triggered the run
          git commit -m "chore: update helm image tag to v1.1 [skip ci]"
          git push origin ${{ github.ref_name }}
          git push origin ${{ github.ref_name }}