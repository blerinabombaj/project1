apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-db-service
spec:
  selector:
    app: {{ .Release.Name }}-db
  ports:
    - name: mysql                         # ← added
      protocol: TCP
      port: 3306
      targetPort: 3306
    {{- if .Values.metrics.enabled }}
    - name: metrics                       # ← added
      port: 9104
      targetPort: 9104
    {{- end }}