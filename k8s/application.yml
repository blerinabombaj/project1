apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: project1-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/blerinabombaj/project1.git
    targetRevision: HEAD
    path: k8s         
  destination:
    server: https://kubernetes.default.svc
    namespace: default 
  syncPolicy:
    automated:        
      prune: true
      selfHeal: true