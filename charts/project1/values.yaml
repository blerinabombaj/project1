replicaCount: 1

image:
  repository: digdigdigdig/devops-project1
  tag: v1.1
  pullPolicy: Always

service:
  type: NodePort
  port: 80
  nodePort: 30888

ingress:
  enabled: true
  host: "localhost"

metrics:
  enabled: true

resources:
  requests:
    memory: "64Mi"
    cpu: "100m"
  limits:
    memory: "128Mi"
    cpu: "200m"

database:
  name: ps_db
  user: ps_user
  password: SecurePassword
  image: postgres:15-alpine