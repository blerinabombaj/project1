apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-deployment
  labels:
    app: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
      annotations:
        # ---------------------------------------------------------------
        # These annotations are read by Prometheus when using plain
        # kubernetes_sd_configs (no Prometheus Operator).
        # If you use ServiceMonitor (see servicemonitor.yaml), these are
        # ignored by the Operator but kept here as a fallback / reference.
        # ---------------------------------------------------------------
        prometheus.io/scrape: {{ .Values.metrics.enabled | quote }}
        prometheus.io/port: "9113"   # nginx-exporter port, NOT the app port
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:

      # ----------------------------------------------------------------
      # Main container — Nginx serving the static site
      # ----------------------------------------------------------------
      - name: {{ .Chart.Name }}-container
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 10001
          capabilities:
            drop:
              - ALL
        env:
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: project1-app-db-secret
              key: db-password
        - name: DB_URL
          valueFrom:
            secretKeyRef:
              name: project1-app-db-secret
              key: db-user
        - name: DB_PORT
          valueFrom:
            secretKeyRef:
              name: project1-app-db-secret
              key: db-port
        ports:
        - containerPort: {{ .Values.service.port }}
          name: http               # named port — referenced by ServiceMonitor
        volumeMounts:
        - name: css-volume
          mountPath: /usr/share/nginx/html/style.css
          subPath: style.css
        - name: tmp-volume
          mountPath: /tmp
        - name: run-volume
          mountPath: /var/run
        - name: cache-volume
          mountPath: /var/cache/nginx
        resources:
          requests:
            memory: {{ .Values.resources.requests.memory | quote }}
            cpu: {{ .Values.resources.requests.cpu | quote }}
          limits:
            memory: {{ .Values.resources.limits.memory | quote }}
            cpu: {{ .Values.resources.limits.cpu | quote }}
        livenessProbe:
          httpGet:
            path: /
            port: {{ .Values.service.port }}
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: {{ .Values.service.port }}
          initialDelaySeconds: 2
          periodSeconds: 5

      # ----------------------------------------------------------------
      # Sidecar — Nginx Prometheus Exporter
      # Why a sidecar? Nginx doesn't expose /metrics natively.
      # This container reads Nginx's stub_status page (localhost only)
      # and converts it into Prometheus format on port 9113.
      # The stub_status location is configured in configmap.yaml.
      # ----------------------------------------------------------------
      {{- if .Values.metrics.enabled }}
      - name: nginx-exporter
        image: nginx/nginx-prometheus-exporter:{{ .Values.metrics.nginxExporter.tag }}
        args:
          # stub_status is only accessible from localhost for security
          - -nginx.scrape-uri=http://localhost:{{ .Values.service.port }}/stub_status
        ports:
        - containerPort: 9113
          name: metrics             # named port — referenced by ServiceMonitor
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 10001
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            memory: {{ .Values.metrics.nginxExporter.resources.requests.memory | quote }}
            cpu: {{ .Values.metrics.nginxExporter.resources.requests.cpu | quote }}
          limits:
            memory: {{ .Values.metrics.nginxExporter.resources.limits.memory | quote }}
            cpu: {{ .Values.metrics.nginxExporter.resources.limits.cpu | quote }}
        livenessProbe:
          httpGet:
            path: /metrics
            port: 9113
          initialDelaySeconds: 5
          periodSeconds: 15
      {{- end }}

      volumes:
      - name: css-volume
        configMap:
          name: project1-config
      - name: tmp-volume
        emptyDir: {}
      - name: run-volume
        emptyDir: {}
      - name: cache-volume
        emptyDir: {}