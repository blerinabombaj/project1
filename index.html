<!DOCTYPE html>
<html>
<head>
    <title>DevOps Infrastructure Monitor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation -->
    <div class="navbar">
        <h1 class="nav-title">DevOps Infrastructure Monitor</h1>
        <div class="nav-buttons">
            <button id="loginBtn" class="nav-btn" onclick="showLogin()">Login</button>
            <button id="registerBtn" class="nav-btn" onclick="showRegister()">Register</button>
            <button id="logoutBtn" class="nav-btn hidden" onclick="logout()">Logout</button>
        </div>
    </div>

    <!-- Dashboard (shown when logged in) -->
    <div id="dashboard" class="dashboard hidden">
        <h1 class="header-title">DevOps Infrastructure Monitor</h1>
        <div class="clock">
            <h1 id="time">00:00:00</h1>
            <p>Managed by ArgoCD & Kubernetes</p>
        </div>
        <p class="welcome-msg">Welcome, <span id="username">User</span>!</p>
    </div>

    <!-- Login Form -->
    <div id="loginForm" class="auth-container">
        <form class="auth-form">
            <h2>Login</h2>
            <input type="text" id="loginUsername" placeholder="Username" required>
            <input type="password" id="loginPassword" placeholder="Password" required>
            <button type="submit" class="auth-btn">Login</button>
            <p class="toggle-auth">Don't have an account? <a href="#" onclick="showRegister()">Register here</a></p>
        </form>
    </div>

    <!-- Register Form -->
    <div id="registerForm" class="auth-container hidden">
        <form class="auth-form">
            <h2>Register</h2>
            <input type="text" id="regUsername" placeholder="Username" required>
            <input type="email" id="regEmail" placeholder="Email" required>
            <input type="password" id="regPassword" placeholder="Password" required>
            <input type="password" id="regConfirmPassword" placeholder="Confirm Password" required>
            <button type="submit" class="auth-btn">Register</button>
            <p class="error-msg" id="regError" style="color: red; display: none;"></p>
            <p class="toggle-auth">Already have an account? <a href="#" onclick="showLogin()">Login here</a></p>
        </form>
    </div>

    <script>
        // User database in localStorage
        function getUsers() {
            const users = localStorage.getItem('users');
            return users ? JSON.parse(users) : {};
        }

        function saveUser(username, password) {
            const users = getUsers();
            users[username] = password;
            localStorage.setItem('users', JSON.stringify(users));
        }

        function userExists(username) {
            const users = getUsers();
            return username in users;
        }

        function validatePassword(username, password) {
            const users = getUsers();
            return users[username] === password;
        }

        // Toggle between login and register forms
        function showLogin() {
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('registerForm').classList.add('hidden');
            clearLoginForm();
        }

        function showRegister() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
            clearRegisterForm();
        }

        // Clear form fields
        function clearLoginForm() {
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
        }

        function clearRegisterForm() {
            document.getElementById('regUsername').value = '';
            document.getElementById('regEmail').value = '';
            document.getElementById('regPassword').value = '';
            document.getElementById('regConfirmPassword').value = '';
            document.getElementById('regError').style.display = 'none';
        }

        // Login/logout
        function login(username) {
            localStorage.setItem('currentUser', username);
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerBtn').classList.add('hidden');
            document.getElementById('loginBtn').classList.add('hidden');
            document.getElementById('logoutBtn').classList.remove('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('username').innerText = username;
            clearLoginForm();
        }

        function logout() {
            localStorage.removeItem('currentUser');
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('loginBtn').classList.remove('hidden');
            document.getElementById('registerBtn').classList.remove('hidden');
            document.getElementById('logoutBtn').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
            clearLoginForm();
        }

        // Clock update
        setInterval(() => {
            const now = new Date();
            document.getElementById('time').innerText = now.toLocaleTimeString();
        }, 1000);

        // Check if user is logged in on page load
        window.addEventListener('load', () => {
            const currentUser = localStorage.getItem('currentUser');
            if (currentUser && userExists(currentUser)) {
                login(currentUser);
            }
        });

        // Handle login form submission
        document.getElementById('loginForm').querySelector('form').addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!userExists(username)) {
                alert('User not found. Please register first.');
                return;
            }

            if (!validatePassword(username, password)) {
                alert('Incorrect password!');
                return;
            }

            login(username);
        });

        // Handle register form submission
        document.getElementById('registerForm').querySelector('form').addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('regUsername').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;

            // Validation
            if (!username) {
                showRegError('Username is required');
                return;
            }

            if (userExists(username)) {
                showRegError('Username already exists!');
                return;
            }

            if (password !== confirmPassword) {
                showRegError('Passwords do not match!');
                return;
            }

            if (password.length < 4) {
                showRegError('Password must be at least 4 characters');
                return;
            }

            // Save user
            saveUser(username, password);
            alert('Registration successful! Please login.');
            showLogin();
        });

        function showRegError(msg) {
            const errorEl = document.getElementById('regError');
            errorEl.innerText = msg;
            errorEl.style.display = 'block';
        }
    </script>
</body>
