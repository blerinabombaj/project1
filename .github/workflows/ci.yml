name: CI/CD - Build, Push, and Update Helm

on:
  push:
    branches: 
      - main
      - feature/helm-migration  # Allows the pipe to run on your new branch

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-project1:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-project1:${{ github.sha }}

      - name: Update Helm Values
        run: |
          # We now target values.yaml instead of the old k8s folder
          # This specifically updates the 'tag:' line under the 'image:' section
          sed -i 's|tag:.*|tag: ${{ github.sha }}|' charts/project1/values.yaml

      - name: Commit and Push Helm Change
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add charts/project1/values.yaml
          
          # This ensures it pushes back to whichever branch triggered the run
          git commit -m "chore: update helm image tag to ${{ github.sha }} [skip ci]"
          git push origin ${{ github.ref_name }}