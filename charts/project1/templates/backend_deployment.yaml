{{- if .Values.backendImage.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "project1.fullname" . }}-backend-deployment
  labels:
    {{- include "project1.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.backendImage.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "project1.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "project1.labels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "project1.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: backend
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.backendImage.repository }}:{{ .Values.backendImage.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.backendImage.pullPolicy }}
          ports:
            - name: http
              containerPort: 3001 # Matches port in backend/server.js
              protocol: TCP
          env:
            - name: PORT
              value: "3001" # Ensure backend listens on this port
            # Database connection details, sourced from the DB ConfigMap
            - name: PGUSER
              valueFrom:
                configMapKeyRef:
                  name: {{ include "project1.fullname" . }}-db-config
                  key: database_user
            - name: PGDATABASE
              valueFrom:
                configMapKeyRef:
                  name: {{ include "project1.fullname" . }}-db-config
                  key: database_name
            - name: PGPASSWORD
              valueFrom:
                configMapKeyRef:
                  name: {{ include "project1.fullname" . }}-db-config
                  key: database_password
            - name: PGHOST
              value: {{ include "project1.fullname" . }}-db-service # Kubernetes DB Service Name
            - name: PGPORT
              value: "5432"
          livenessProbe: # Basic health check for Kubernetes
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.backendImage.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}