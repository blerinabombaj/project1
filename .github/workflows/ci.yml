name: CI/CD - Build, Push, and Update Manifest

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-project1:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-project1:${{ github.sha }}

      - name: Update Kubernetes YAML
        run: |
          # This specifically looks for your image name and replaces the tag with the SHA
          sed -i 's|image:.*|image: digdigdigdig/devops-project1:${{ github.sha }}|' k8s/deployment.yml
      - name: Commit and Push Manifest Change
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add k8s/deployment.yml
          # The [skip ci] is important so this commit doesn't trigger the workflow again!
          git commit -m "chore: update image tag to ${{ github.sha }} [skip ci]"
          git push origin main