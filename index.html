<!DOCTYPE html>
<html>
<head>
    <title>DevOps Timer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 class="header-title">DevOps Infrastructure Monitor</h1>

    <div class="clock">
        <h1 id="time">00:00:00</h1>
        <p>Managed by ArgoCD & Kubernetes</p>
    </div>

    <script>
        setInterval(() => {
            const now = new Date();
            document.getElementById('time').innerText = now.toLocaleTimeString();
        }, 1000);
    </script>
</body>
