<!DOCTYPE html>
<html>
<head>
    <title>Snake Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Login Form -->
    <div id="loginForm" class="auth-container">
        <form class="auth-form">
            <h2>Snake Game</h2>
            <input type="text" id="loginUsername" placeholder="Username" required>
            <input type="password" id="loginPassword" placeholder="Password" required>
            <button type="submit" class="auth-btn">Login</button>
            <p class="toggle-auth">Don't have an account? <a href="#" onclick="showRegister(event)">Register here</a></p>
            <p class="error-msg" id="loginError" style="color: red; display: none;"></p>
        </form>
    </div>

    <!-- Register Form -->
    <div id="registerForm" class="auth-container hidden">
        <form class="auth-form">
            <h2>Create Account</h2>
            <input type="text" id="regUsername" placeholder="Username" required>
            <input type="password" id="regPassword" placeholder="Password" required>
            <input type="password" id="regConfirmPassword" placeholder="Confirm Password" required>
            <button type="submit" class="auth-btn">Register</button>
            <p class="toggle-auth">Already have an account? <a href="#" onclick="showLogin(event)">Login here</a></p>
            <p class="error-msg" id="regError" style="color: red; display: none;"></p>
        </form>
    </div>

    <!-- Game Container -->
    <div id="gameContainer" class="hidden">
        <div class="game-header">
            <div class="game-info">
                <h1>🐍 Snake Game</h1>
                <p id="playerName" class="player-name">Welcome, Player!</p>
            </div>
            <button id="logoutBtn" class="logout-btn" onclick="logout()">Logout</button>
        </div>

        <div class="game-board">
            <canvas id="gameCanvas" width="400" height="400" style="background-color: #000; display: block; margin: 0 auto;"></canvas>
        </div>

        <div class="game-controls">
            <div class="stats">
                <div class="stat-box">
                    <p class="stat-label">Score</p>
                    <p class="stat-value" id="score">0</p>
                </div>
                <div class="stat-box">
                    <p class="stat-label">High Score</p>
                    <p class="stat-value" id="highScore">0</p>
                </div>
                <div class="stat-box">
                    <p class="stat-label">Level</p>
                    <p class="stat-value" id="level">1</p>
                </div>
            </div>

            <div class="buttons">
                <button id="startBtn" class="game-btn" onclick="startGame()">Start Game</button>
                <button id="pauseBtn" class="game-btn" onclick="togglePause()" style="display: none;">Pause</button>
            </div>

            <div class="instructions">
                <p><strong>Controls:</strong> Arrow Keys or WASD to move</p>
                <p><strong>Goal:</strong> Eat food, grow longer, don't hit walls or yourself!</p>
            </div>
        </div>
    </div>

    <script>
        // ==================== Auth System ====================
        function getUsers() {
            const users = localStorage.getItem('users');
            return users ? JSON.parse(users) : {};
        }

        function saveUser(username, password) {
            const users = getUsers();
            users[username] = { password, highScore: 0 };
            localStorage.setItem('users', JSON.stringify(users));
        }

        function userExists(username) {
            return username in getUsers();
        }

        function validatePassword(username, password) {
            const users = getUsers();
            return users[username]?.password === password;
        }

        function getHighScore(username) {
            const users = getUsers();
            return users[username]?.highScore || 0;
        }

        function saveHighScore(username, score) {
            const users = getUsers();
            if (users[username] && score > (users[username].highScore || 0)) {
                users[username].highScore = score;
                localStorage.setItem('users', JSON.stringify(users));
            }
        }

        function showLogin(e) {
            e.preventDefault();
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('registerForm').classList.add('hidden');
            clearLoginForm();
        }

        function showRegister(e) {
            e.preventDefault();
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
            clearRegisterForm();
        }

        function clearLoginForm() {
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
            document.getElementById('loginError').style.display = 'none';
        }

        function clearRegisterForm() {
            document.getElementById('regUsername').value = '';
            document.getElementById('regPassword').value = '';
            document.getElementById('regConfirmPassword').value = '';
            document.getElementById('regError').style.display = 'none';
        }

        function login(username) {
            currentUsername = username;
            localStorage.setItem('currentUser', username);
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('gameContainer').classList.remove('hidden');
            document.getElementById('playerName').innerText = `Welcome, ${username}!`;
            updateHighScoreDisplay();
            initGame();
        }

        function logout() {
            localStorage.removeItem('currentUser');
            currentUsername = null;
            document.getElementById('gameContainer').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
            clearLoginForm();
            stopGame();
        }

        document.getElementById('loginForm').querySelector('form').addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!userExists(username)) {
                showLoginError('User not found. Please register first.');
                return;
            }

            if (!validatePassword(username, password)) {
                showLoginError('Incorrect password!');
                return;
            }

            login(username);
        });

        document.getElementById('registerForm').querySelector('form').addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;

            if (!username) {
                showRegError('Username is required');
                return;
            }

            if (userExists(username)) {
                showRegError('Username already exists!');
                return;
            }

            if (password !== confirmPassword) {
                showRegError('Passwords do not match!');
                return;
            }

            if (password.length < 4) {
                showRegError('Password must be at least 4 characters');
                return;
            }

            saveUser(username, password);
            alert('Registration successful! Please login.');
            showLogin({preventDefault: () => {}});
        });

        function showLoginError(msg) {
            const errorEl = document.getElementById('loginError');
            errorEl.innerText = msg;
            errorEl.style.display = 'block';
        }

        function showRegError(msg) {
            const errorEl = document.getElementById('regError');
            errorEl.innerText = msg;
            errorEl.style.display = 'block';
        }

        window.addEventListener('load', () => {
            const currentUser = localStorage.getItem('currentUser');
            if (currentUser && userExists(currentUser)) {
                login(currentUser);
            }
        });

        // ==================== Snake Game ====================
        let currentUsername = null;
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [{x: 10, y: 10}];
        let food = {x: 15, y: 15};
        let direction = {x: 1, y: 0};
        let nextDirection = {x: 1, y: 0};
        let score = 0;
        let gameRunning = false;
        let gamePaused = false;
        let gameSpeed = 100;
        let gameLoop = null;

        function initGame() {
            snake = [{x: 10, y: 10}];
            food = generateFood();
            direction = {x: 1, y: 0};
            nextDirection = {x: 1, y: 0};
            score = 0;
            gameSpeed = 100;
            document.getElementById('score').innerText = '0';
            document.getElementById('level').innerText = '1';
            document.getElementById('startBtn').style.display = 'block';
            document.getElementById('pauseBtn').style.display = 'none';
            draw();
        }

        function startGame() {
            if (gameRunning) return;
            gameRunning = true;
            gamePaused = false;
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('pauseBtn').style.display = 'block';
            document.getElementById('pauseBtn').innerText = 'Pause';
            runGame();
        }

        function togglePause() {
            if (!gameRunning) return;
            gamePaused = !gamePaused;
            document.getElementById('pauseBtn').innerText = gamePaused ? 'Resume' : 'Pause';
            if (!gamePaused) runGame();
        }

        function stopGame() {
            gameRunning = false;
            clearTimeout(gameLoop);
        }

        function runGame() {
            if (gamePaused) return;

            gameLoop = setTimeout(() => {
                update();
                draw();
                if (gameRunning) runGame();
            }, gameSpeed);
        }

        function update() {
            direction = nextDirection;
            const head = {x: snake[0].x + direction.x, y: snake[0].y + direction.y};

            // Wall collision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                endGame();
                return;
            }

            // Self collision
            for (let segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    endGame();
                    return;
                }
            }

            snake.unshift(head);

            // Food collision
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').innerText = score;
                food = generateFood();

                // Increase difficulty
                if (score % 50 === 0) {
                    gameSpeed = Math.max(50, gameSpeed - 10);
                    const level = Math.floor(score / 50) + 1;
                    document.getElementById('level').innerText = level;
                }
            } else {
                snake.pop();
            }
        }

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw snake
            ctx.fillStyle = '#00ff00';
            for (let segment of snake) {
                ctx.fillRect(segment.x * gridSize + 1, segment.y * gridSize + 1, gridSize - 2, gridSize - 2);
            }

            // Draw food
            ctx.fillStyle = '#ff0000';
            ctx.fillRect(food.x * gridSize + 1, food.y * gridSize + 1, gridSize - 2, gridSize - 2);
        }

        function generateFood() {
            let newFood;
            let collision = true;
            while (collision) {
                newFood = {x: Math.floor(Math.random() * tileCount), y: Math.floor(Math.random() * tileCount)};
                collision = snake.some(seg => seg.x === newFood.x && seg.y === newFood.y);
            }
            return newFood;
        }

        function endGame() {
            gameRunning = false;
            clearTimeout(gameLoop);
            saveHighScore(currentUsername, score);
            alert(`Game Over! Final Score: ${score}`);
            updateHighScoreDisplay();
            document.getElementById('startBtn').style.display = 'block';
            document.getElementById('pauseBtn').style.display = 'none';
        }

        function updateHighScoreDisplay() {
            if (currentUsername) {
                const highScore = getHighScore(currentUsername);
                document.getElementById('highScore').innerText = highScore;
            }
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;

            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (direction.y === 0) nextDirection = {x: 0, y: -1};
                    e.preventDefault();
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (direction.y === 0) nextDirection = {x: 0, y: 1};
                    e.preventDefault();
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (direction.x === 0) nextDirection = {x: -1, y: 0};
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (direction.x === 0) nextDirection = {x: 1, y: 0};
                    e.preventDefault();
                    break;
            }
        });
    </script>
</body>
</html>
