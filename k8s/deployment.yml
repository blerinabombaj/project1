apiVersion: apps/v1
kind: Deployment
metadata:
  name: project1-deployment
  labels:
    app: project1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: project1
  template:
    metadata:
      labels:
        app: project1
    spec:
      containers:
      - name: project1container
        image: digdigdigdig/devops-project1:13903f177b15aaa1b74513e2647802fef41af124
        ports:
        - containerPort: 80
        
        # --- ADD THESE GUARDRAILS ---
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"

        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 2
          periodSeconds: 5